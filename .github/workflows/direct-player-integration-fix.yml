name: Direct Player Integration Fix

on:
  pull_request:
    branches: ["develop/rootless-zach-foundation"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direct-player-integration-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  ANDROID_PLATFORM_PACKAGE: platforms;android-36
  ANDROID_BUILD_TOOLS_PACKAGE: build-tools;36.0.0
  ANDROID_NDK_PACKAGE: ndk;28.2.13676358
  ANDROID_CMAKE_PACKAGE: cmake;3.22.1

jobs:
  integrate-test-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/direct-player-usb-bit-perfect
          submodules: recursive
          fetch-depth: 0

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK and NDK
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "$ANDROID_PLATFORM_PACKAGE" \
            "$ANDROID_BUILD_TOOLS_PACKAGE" \
            "$ANDROID_NDK_PACKAGE" \
            "$ANDROID_CMAKE_PACKAGE"

      - name: Integrate Direct Player deterministically
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          build = Path('app/build.gradle.kts')
          build_text = build.read_text(encoding='utf-8')
          dependency = '    implementation("androidx.media3:media3-exoplayer:1.10.0")\n'
          if dependency not in build_text:
              anchor = '    implementation("androidx.mediarouter:mediarouter:1.7.0")\n'
              if anchor not in build_text:
                  raise RuntimeError('MediaRouter dependency anchor missing')
              build_text = build_text.replace(anchor, anchor + dependency, 1)
          build.write_text(build_text, encoding='utf-8')
          print('Integrated Media3 dependency')

          Path('app/src/main/java/me/timschneeberger/rootlessjamesdsp/fragment/settings/SettingsFragment.kt').write_text('''package me.timschneeberger.rootlessjamesdsp.fragment.settings

          import android.content.Intent
          import android.os.Bundle
          import androidx.preference.Preference
          import me.timschneeberger.rootlessjamesdsp.R
          import me.timschneeberger.rootlessjamesdsp.activity.DirectPlayerActivity
          import me.timschneeberger.rootlessjamesdsp.utils.isPlugin
          import me.timschneeberger.rootlessjamesdsp.utils.isRootless

          class SettingsFragment : SettingsBaseFragment() {
              private val processing by lazy { findPreference<Preference>(getString(R.string.key_audio_format)) }
              private val directPlayer by lazy { findPreference<Preference>(getString(R.string.key_direct_player)) }
              private val troubleshooting by lazy { findPreference<Preference>(getString(R.string.key_troubleshooting)) }
              private val diagnostics by lazy { findPreference<Preference>(getString(R.string.key_diagnostics)) }

              override fun onCreatePreferences(savedInstanceState: Bundle?, rootKey: String?) {
                  setPreferencesFromResource(R.xml.app_preferences, rootKey)

                  processing?.summary = getString(
                      when {
                          isRootless() -> R.string.audio_format_summary
                          isPlugin() -> R.string.audio_format_summary_plugin
                          else -> R.string.audio_format_summary_root
                      },
                  )
                  troubleshooting?.isVisible = isRootless()
                  diagnostics?.isVisible = isRootless()
                  directPlayer?.isVisible = isRootless()
                  directPlayer?.setOnPreferenceClickListener {
                      startActivity(Intent(requireContext(), DirectPlayerActivity::class.java))
                      true
                  }
              }

              companion object {
                  fun newInstance(): SettingsFragment = SettingsFragment()
              }
          }
          '''.replace('          ', ''), encoding='utf-8')
          print('Rewrote SettingsFragment')

          prefs = Path('app/src/main/res/xml/app_preferences.xml')
          prefs_text = prefs.read_text(encoding='utf-8')
          if '@string/key_direct_player' not in prefs_text:
              key_position = prefs_text.index('app:key="@string/key_device_profiles"')
              preference_start = prefs_text.rfind('    <Preference', 0, key_position)
              if preference_start < 0:
                  raise RuntimeError('Device profile preference boundary missing')
              direct_preference = '''    <Preference
                  app:key="@string/key_direct_player"
                  app:title="@string/direct_player_title"
                  app:summary="@string/direct_player_settings_summary"
                  app:icon="@drawable/ic_twotone_volume_up_24dp" />

          '''.replace('          ', '')
              prefs_text = prefs_text[:preference_start] + direct_preference + prefs_text[preference_start:]
          prefs.write_text(prefs_text, encoding='utf-8')
          print('Integrated Direct Player preference')

          manifest = Path('app/src/main/AndroidManifest.xml')
          manifest_text = manifest.read_text(encoding='utf-8')
          if '.activity.DirectPlayerActivity' not in manifest_text:
              name_position = manifest_text.index('android:name=".activity.BlocklistActivity"')
              activity_start = manifest_text.rfind('        <activity', 0, name_position)
              if activity_start < 0:
                  raise RuntimeError('Blocklist activity boundary missing')
              activity = '''        <activity
                  android:name=".activity.DirectPlayerActivity"
                  android:exported="false"
                  android:label="@string/direct_player_title"
                  android:theme="@style/Theme.RootlessJamesDSP">
                  <meta-data
                      android:name="android.support.PARENT_ACTIVITY"
                      android:value=".activity.SettingsActivity" />
              </activity>

          '''.replace('          ', '')
              manifest_text = manifest_text[:activity_start] + activity + manifest_text[activity_start:]
          manifest.write_text(manifest_text, encoding='utf-8')
          print('Integrated DirectPlayerActivity manifest entry')

          handoff = Path('docs/AGENT_HANDOFF.md')
          handoff_text = handoff.read_text(encoding='utf-8').rstrip()
          marker = '## 2026-07-17 Direct Player and USB checkpoint'
          if marker not in handoff_text:
              handoff_text += '''

          ## 2026-07-17 Direct Player and USB checkpoint

          - Branch: `feature/direct-player-usb-bit-perfect`
          - Parent foundation head: `8f0b9fd520584ae091e21e6976d43ad167dc07e3`
          - PR #1 and the performance PR remain draft and unmerged.
          - MQA result: no decoder approved for redistribution; the FOSS registry is intentionally empty.
          - Implemented: source-owning Media3 player, local lossless inspection, optional decoder boundary,
            exact API 34 USB mixer matching, preference read-back verification, hot-unplug cleanup, unit
            tests, instrumentation navigation test, legal audit, and architecture documentation.
          - Claim boundary: compressed FLAC/ALAC can be high-resolution lossless but cannot be called
            bit-perfect until decoded PCM is independently verified.
          - Physical status: blocked on Galaxy S23 Ultra plus external USB DAC validation.
          - Next action: add decoded-output format observation and run the physical USB acceptance matrix.
          '''.replace('          ', '')
          handoff.write_text(handoff_text + '\n', encoding='utf-8')
          print('Updated agent handoff')
          PY
          git diff --check
          git status --short

      - name: Unit tests
        run: ./gradlew --stacktrace --console=plain testRootlessFdroidDebugUnitTest

      - name: Compile instrumentation APK
        run: ./gradlew --stacktrace --console=plain assembleRootlessFdroidDebugAndroidTest

      - name: Lint
        run: ./gradlew --stacktrace --console=plain lintRootlessFdroidDebug

      - name: Build installable APK
        run: ./gradlew --stacktrace --console=plain assembleRootlessFdroidDebug

      - name: Verify APK
        shell: bash
        run: |
          set -euo pipefail
          APK_DIR="app/build/outputs/apk/rootlessFdroid/debug"
          VERIFY_DIR="direct-player-verification"
          mkdir -p "$VERIFY_DIR"
          mapfile -t APKS < <(find "$APK_DIR" -maxdepth 1 -type f -name '*.apk' -print | sort)
          test "${#APKS[@]}" -gt 0
          : > "$VERIFY_DIR/SHA256SUMS.txt"
          for apk in "${APKS[@]}"; do
            name="$(basename "$apk")"
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$apk" > "$VERIFY_DIR/${name}.apksigner.txt"
            "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$apk" > "$VERIFY_DIR/${name}.zipalign.txt"
            "$ANDROID_HOME/build-tools/36.0.0/aapt2" dump badging "$apk" > "$VERIFY_DIR/${name}.badging.txt"
            grep -q "package: name='com.zfkirke0109.rootlesszachdsp.debug'" "$VERIFY_DIR/${name}.badging.txt"
            grep -q "application-label:'RootlessZachDSP'" "$VERIFY_DIR/${name}.badging.txt"
            sha256sum "$apk" | tee -a "$VERIFY_DIR/SHA256SUMS.txt"
          done

      - name: Commit validated checkpoint
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/direct-player-checkpoint.yml .github/workflows/direct-player-integration-fix.yml
          git add -A
          git diff --cached --check
          git commit -m "feat(player): add lawful lossless USB player foundation"
          git push origin HEAD:feature/direct-player-usb-bit-perfect
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload APK and evidence
        uses: actions/upload-artifact@v4
        with:
          name: RootlessZachDSP-direct-player-${{ steps.commit.outputs.sha }}
          if-no-files-found: error
          path: |
            app/build/outputs/apk/rootlessFdroid/debug/*.apk
            app/build/outputs/apk/androidTest/rootlessFdroid/debug/*.apk
            app/build/reports/tests/**
            app/build/reports/lint-results-*
            direct-player-verification/**
