name: Cleanup Realtime Checkpoint Reports

on:
  push:
    branches: ["perf/realtime-audio-diagnostics"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf/realtime-audio-diagnostics
          fetch-depth: 0
      - name: Remove generated reports from source branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ci-artifacts
          rm -f .github/workflows/cleanup-realtime-checkpoint.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore(ci): keep generated reports out of source"
          git push origin HEAD:perf/realtime-audio-diagnostics
