name: RootlessZachDSP Settings Navigation UI

on:
  pull_request:
    branches: [master]
  push:
    branches: ["develop/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rootless-zach-diagnostics-patcher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  settings-navigation:
    name: Apply diagnostics accuracy patch
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out development branch
        uses: actions/checkout@v4
        with:
          ref: develop/rootless-zach-foundation
          fetch-depth: 2
          show-progress: false
          persist-credentials: true

      - name: Apply diagnostics patch
        run: python3 .github/scripts/apply_diagnostics_accuracy_patch.py

      - name: Commit and push source changes
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app docs
          git diff --cached --check
          git diff --cached --stat
          git commit -m "feat(diagnostics): measure AudioTrack input and classify reconfiguration"
          git push origin HEAD:develop/rootless-zach-foundation
