name: RootlessZachDSP Settings Navigation UI

on:
  pull_request:
    branches: [master]
  push:
    branches: ["develop/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rootless-zach-settings-ui-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM_PACKAGE: platforms;android-36
  ANDROID_BUILD_TOOLS_PACKAGE: build-tools;36.0.0
  ANDROID_NDK_PACKAGE: ndk;28.2.13676358
  ANDROID_CMAKE_PACKAGE: cmake;3.22.1

jobs:
  settings-navigation:
    if: github.actor != 'github-actions[bot]'
    name: Main screen Settings navigation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out development branch and DSP submodules
        uses: actions/checkout@v4
        with:
          ref: develop/rootless-zach-foundation
          submodules: recursive
          fetch-depth: 2
          persist-credentials: true

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android 16 build toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "$ANDROID_PLATFORM_PACKAGE" \
            "$ANDROID_BUILD_TOOLS_PACKAGE" \
            "$ANDROID_NDK_PACKAGE" \
            "$ANDROID_CMAKE_PACKAGE"

      - name: Enable KVM access
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build and run MainActivity Settings navigation test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set +e
            ./gradlew --stacktrace --info --console=plain connectedRootlessFdroidDebugAndroidTest \
              > "$GITHUB_WORKSPACE/settings-navigation-gradle.log" 2>&1
            status=$?
            printf '%s\n' "$status" > "$GITHUB_WORKSPACE/settings-navigation-status.txt"
            tail -n 200 "$GITHUB_WORKSPACE/settings-navigation-gradle.log"
            exit 0

      - name: Commit concise failure evidence
        shell: bash
        run: |
          set -euo pipefail
          status="$(cat settings-navigation-status.txt)"
          if [ "$status" -eq 0 ]; then
            rm -f docs/SETTINGS_UI_FAILURE.md
            exit 0
          fi
          {
            echo '# Settings navigation instrumentation failure'
            echo
            echo '```text'
            tail -n 500 settings-navigation-gradle.log
            echo '```'
          } > docs/SETTINGS_UI_FAILURE.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/SETTINGS_UI_FAILURE.md
          git commit -m "chore: capture Settings instrumentation failure"
          git push origin HEAD:develop/rootless-zach-foundation

      - name: Enforce Settings navigation gate
        shell: bash
        run: |
          status="$(cat settings-navigation-status.txt)"
          exit "$status"
