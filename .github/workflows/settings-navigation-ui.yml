name: RootlessZachDSP Settings Navigation UI

on:
  pull_request:
    branches: [master]
  push:
    branches: ["develop/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rootless-zach-settings-ui-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM_PACKAGE: platforms;android-36
  ANDROID_BUILD_TOOLS_PACKAGE: build-tools;36.0.0
  ANDROID_NDK_PACKAGE: ndk;28.2.13676358
  ANDROID_CMAKE_PACKAGE: cmake;3.22.1

jobs:
  settings-navigation:
    name: Main screen Settings navigation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository and DSP submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android 16 build toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "$ANDROID_PLATFORM_PACKAGE" \
            "$ANDROID_BUILD_TOOLS_PACKAGE" \
            "$ANDROID_NDK_PACKAGE" \
            "$ANDROID_CMAKE_PACKAGE"

      - name: Enable KVM access
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build and run MainActivity Settings navigation test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -o pipefail
            ./gradlew --stacktrace --info --console=plain connectedRootlessFdroidDebugAndroidTest 2>&1 \
              | tee settings-navigation-gradle.log

      - name: Collect emulator navigation failure evidence
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p ci-artifacts/settings-navigation
          cp settings-navigation-gradle.log ci-artifacts/settings-navigation/ 2>/dev/null
          cp -R app/build/reports/androidTests/connected ci-artifacts/settings-navigation/reports 2>/dev/null
          cp -R app/build/outputs/androidTest-results/connected ci-artifacts/settings-navigation/results 2>/dev/null
          find app/build -type f \( -name '*.png' -o -name '*.xml' -o -name '*.html' -o -name '*.txt' \) \
            -path '*androidTest*' -print0 2>/dev/null \
            | xargs -0 -r -I{} cp --parents '{}' ci-artifacts/settings-navigation/

      - name: Upload emulator navigation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RootlessZachDSP-settings-navigation-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: ci-artifacts/settings-navigation/**
