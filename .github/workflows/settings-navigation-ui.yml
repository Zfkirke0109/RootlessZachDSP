name: RootlessZachDSP Settings Navigation UI

on:
  pull_request:
    branches: [master]
  push:
    branches: ["develop/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rootless-zach-settings-ui-patcher-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM_PACKAGE: platforms;android-36
  ANDROID_BUILD_TOOLS_PACKAGE: build-tools;36.0.0
  ANDROID_NDK_PACKAGE: ndk;28.2.13676358
  ANDROID_CMAKE_PACKAGE: cmake;3.22.1

jobs:
  settings-navigation:
    if: github.event_name == 'push'
    name: Apply device patch and validate final commit
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository and DSP submodules
        uses: actions/checkout@v4
        with:
          ref: develop/rootless-zach-foundation
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Narrow the manifest edit to the application element
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          patcher = Path('.github/scripts/apply_rootless_phase_patch.py')
          text = patcher.read_text(encoding='utf-8')
          start = text.index('MANIFEST = "app/src/main/AndroidManifest.xml"')
          end = text.index('COMPAT = "', start)
          patcher.write_text(text[:start] + text[end:], encoding='utf-8')
          PY

      - name: Apply device, fidelity, profile, and icon patch
        shell: bash
        run: |
          set +e
          python .github/scripts/apply_rootless_phase_patch.py > patch-apply.log 2>&1
          status=$?
          cat patch-apply.log
          if [ "$status" -ne 0 ]; then
            cp patch-apply.log docs/PATCH_FAILURE.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/PATCH_FAILURE.txt
            git commit -m "chore: capture device patch failure"
            git push origin HEAD:develop/rootless-zach-foundation
            exit "$status"
          fi

      - name: Add round launcher icon to the application element
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          manifest = Path('app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          old = '        android:icon="@mipmap/ic_dsp_launcher"\n        android:label="${label}"\n'
          new = '        android:icon="@mipmap/ic_dsp_launcher"\n        android:roundIcon="@mipmap/ic_dsp_launcher"\n        android:label="${label}"\n'
          if old not in text:
              raise RuntimeError('Application launcher icon sequence not found')
          manifest.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove one-time installer and restore normal UI workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/scripts/apply_rootless_phase_patch.py
          rm -f .github/scripts/rootless_icon.b64.part0
          rm -f .github/scripts/rootless_icon.b64.part1
          rm -f .github/scripts/rootless_icon.b64.part2
          rm -f .github/scripts/rootless_icon.b64.part3
          rm -f .github/workflows/apply-rootless-device-patch.yml
          rm -f docs/PATCH_FAILURE.txt
          git show HEAD^:.github/workflows/settings-navigation-ui.yml \
            > .github/workflows/settings-navigation-ui.yml

      - name: Commit final source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(rootless): release projection and add device fidelity profiles"
          git push origin HEAD:develop/rootless-zach-foundation
          echo "FINAL_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android 16 build toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "$ANDROID_PLATFORM_PACKAGE" \
            "$ANDROID_BUILD_TOOLS_PACKAGE" \
            "$ANDROID_NDK_PACKAGE" \
            "$ANDROID_CMAKE_PACKAGE"

      - name: Run deterministic tests
        run: ./gradlew --stacktrace testRootlessFdroidDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --stacktrace assembleRootlessFdroidDebug

      - name: Verify package, signature, 16 KiB alignment, and checksum
        shell: bash
        run: |
          set -euo pipefail
          APK_DIR="app/build/outputs/apk/rootlessFdroid/debug"
          VERIFY_DIR="ci-artifacts/device-patch-verification"
          mkdir -p "$VERIFY_DIR"
          mapfile -t APKS < <(find "$APK_DIR" -maxdepth 1 -type f -name '*.apk' -print | sort)
          test "${#APKS[@]}" -gt 0 || { echo "No debug APKs found" >&2; exit 1; }
          : > "$VERIFY_DIR/SHA256SUMS.txt"
          for apk in "${APKS[@]}"; do
            name="$(basename "$apk")"
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$apk" \
              > "$VERIFY_DIR/${name}.apksigner.txt"
            "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$apk" \
              > "$VERIFY_DIR/${name}.zipalign.txt"
            "$ANDROID_HOME/build-tools/36.0.0/aapt2" dump badging "$apk" \
              > "$VERIFY_DIR/${name}.badging.txt"
            grep -q "package: name='com.zfkirke0109.rootlesszachdsp.debug'" \
              "$VERIFY_DIR/${name}.badging.txt"
            grep -q "application-label:'RootlessZachDSP'" \
              "$VERIFY_DIR/${name}.badging.txt"
            sha256sum "$apk" >> "$VERIFY_DIR/SHA256SUMS.txt"
          done

      - name: Run Android lint
        run: ./gradlew --stacktrace --console=plain lintRootlessFdroidDebug

      - name: Enable KVM access
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run MainActivity Settings navigation test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew --stacktrace connectedRootlessFdroidDebugAndroidTest

      - name: Write final commit identity
        if: always()
        shell: bash
        run: |
          mkdir -p ci-artifacts/device-patch-verification
          printf '%s\n' "${FINAL_SHA:-unknown}" \
            > ci-artifacts/device-patch-verification/FINAL_COMMIT.txt

      - name: Upload final APK and validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RootlessZachDSP-device-patch-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            app/build/outputs/apk/rootlessFdroid/debug/*.apk
            app/build/reports/tests/**
            app/build/reports/lint-results-rootlessFdroidDebug.*
            ci-artifacts/device-patch-verification/**
