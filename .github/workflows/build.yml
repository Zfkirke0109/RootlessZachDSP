name: Build signed app
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest

    strategy:
      matrix:
        flavor: [Rootless, Root]
        
    steps:
      - id: flavor
        uses: ASzc/change-string-case-action@v5
        with:
          string: ${{ matrix.flavor }}
          
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install rename
    
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@v3

      - name: Install APK signing tools
        run: sdkmanager "build-tools;35.0.0"

      - name: Build release app
        if: startsWith(github.ref, 'refs/tags/')
        uses: gradle/gradle-command-action@v2
        with:
          arguments: assemble${{ matrix.flavor }}FullRelease

      - name: Build preview app
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: gradle/gradle-command-action@v2
        with:
          arguments: assemble${{ matrix.flavor }}FullPreview
          
      - name: Declare preview build type
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          set -x
          echo "BUILD_TYPE=preview" >> $GITHUB_ENV
          
      - name: Declare release build type
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -x
          echo "BUILD_TYPE=release" >> $GITHUB_ENV
          
      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -x
          echo "VERSION_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
       
      - name: Restore and validate signing keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPECTED_SIGNER_SHA256: ${{ secrets.EXPECTED_SIGNER_SHA256 }}
        run: |
          set -euo pipefail
          for secret in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD EXPECTED_SIGNER_SHA256; do
            test -n "${!secret}" || { echo "::error::Required secret $secret is not configured."; exit 1; }
          done

          keystore_path="$RUNNER_TEMP/rootlesszachdsp.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          test -s "$keystore_path" || { echo "::error::Decoded keystore is empty."; exit 1; }
          keytool -list -keystore "$keystore_path" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null

          actual_fingerprint="$(
            keytool -exportcert -keystore "$keystore_path" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" \
              | sha256sum | awk '{print toupper($1)}'
          )"
          expected_fingerprint="$(printf '%s' "$EXPECTED_SIGNER_SHA256" | tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]')"
          test "$actual_fingerprint" = "$expected_fingerprint" || { echo "::error::Signing certificate fingerprint mismatch."; exit 1; }
          echo "ANDROID_SIGNING_KEYSTORE=$keystore_path" >> "$GITHUB_ENV"

      - name: Sign and verify APKs
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPECTED_SIGNER_SHA256: ${{ secrets.EXPECTED_SIGNER_SHA256 }}
        run: |
          set -euo pipefail
          release_dir="app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}"
          apksigner="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          mapfile -t apks < <(find "$release_dir" -maxdepth 1 -type f -name '*.apk' ! -name '*-signed.apk' -print | sort)
          test "${#apks[@]}" -gt 0 || { echo "::error::No APKs found to sign in $release_dir."; exit 1; }

          for apk in "${apks[@]}"; do
            signed="${apk%.apk}-signed.apk"
            aligned="$RUNNER_TEMP/$(basename "${apk%.apk}")-aligned.apk"
            "$ANDROID_HOME/build-tools/35.0.0/zipalign" -f -P 16 4 "$apk" "$aligned"
            "$apksigner" sign \
              --ks "$ANDROID_SIGNING_KEYSTORE" \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass env:KEYSTORE_PASSWORD \
              --key-pass env:KEY_PASSWORD \
              --out "$signed" "$aligned"
            report="$RUNNER_TEMP/$(basename "$signed").apksigner.txt"
            "$apksigner" verify --verbose --print-certs "$signed" | tee "$report"
            actual="$(awk -F': ' '/Signer #[0-9]+ certificate SHA-256 digest:/ {print toupper($2); exit}' "$report" | tr -d '[:space:]:' )"
            expected="$(printf '%s' "$EXPECTED_SIGNER_SHA256" | tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]')"
            test "$actual" = "$expected" || { echo "::error::Signed APK certificate mismatch."; exit 1; }
            rm -f "$aligned"
          done

      - name: Remove signing material from runner
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/rootlesszachdsp.jks"

      - name: Rename build artifacts
        run: |
          set -e
          ls -l app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}
          rename -v 's/-unsigned-signed//g' app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}/*.apk
          rm -f app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}/*unsigned*.apk || true
          ls -l app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}

      - name: Upload build artifact (universal)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.flavor }}JamesDSP-universal-preview_apk"
          path: app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}/*universal-${{ env.BUILD_TYPE }}-signed.apk

      - name: Upload build artifact (x86)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.flavor }}JamesDSP-x86-preview_apk"
          path: app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}/*x86-${{ env.BUILD_TYPE }}-signed.apk
          
      - name: Upload build artifact (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.flavor }}JamesDSP-x86_64-preview_apk"
          path: app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}/*x86_64-${{ env.BUILD_TYPE }}-signed.apk
          
      - name: Upload build artifact (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.flavor }}JamesDSP-armeabi-v7a-preview_apk"
          path: app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}/*armeabi-v7a-${{ env.BUILD_TYPE }}-signed.apk
               
      - name: Upload build artifact (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.flavor }}JamesDSP-arm64-v8a-preview_apk"
          path: app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}/*arm64-v8a-${{ env.BUILD_TYPE }}-signed.apk
       
      - name: Deploy root flavor APKs to the server
        if: ${{ steps.flavor.outputs.lowercase == 'root' && startsWith(github.ref, 'refs/tags/') && github.repository == 'timschneeb/RootlessJamesDSP' }}
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
            username: 'tim'
            server: 'srv1.timschneeberger.me'
            ssh_private_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }} 
            local_path: "app/build/outputs/apk/${{ steps.flavor.outputs.lowercase }}Full/${{ env.BUILD_TYPE }}/*universal-${{ env.BUILD_TYPE }}-signed.apk"
            remote_path: '/srv/http/nightly.timschneeberger.me/jamesdsp-rootfull'
            sftpArgs: '-o ConnectTimeout=5'
       
      - name: Changelog
        if: startsWith(github.ref, 'refs/tags/')
        uses: ardalanamini/auto-changelog@v3
        id: changelog
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-name: ${{ env.VERSION_TAG }}
          mention-authors: false
          mention-new-contributors: false
          include-compare: true
          
      - name: Read changelog template
        id: changelog_post
        uses: andstor/file-reader-action@v1
        with:
          path: ".github/CHANGELOG_POSTFIX.md"
          
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && github.repository == 'timschneeb/RootlessJamesDSP'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: RootlessJamesDSP ${{ env.VERSION_TAG }}
          body: "${{ steps.changelog.outputs.changelog }} &#x20; ${{ steps.changelog_post.outputs.contents }}"
          #files: |
          #   app/build/outputs/apk/rootlessFull/${{ env.BUILD_TYPE }}/*-signed.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
