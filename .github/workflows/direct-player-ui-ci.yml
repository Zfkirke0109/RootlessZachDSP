name: Direct Player Physical Checkpoint

on:
  push:
    branches: ["feature/direct-player-ui"]
  pull_request:
    branches: ["develop/direct-player-usb-foundation"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direct-player-ui-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM_PACKAGE: platforms;android-36
  ANDROID_BUILD_TOOLS_PACKAGE: build-tools;36.0.0
  ANDROID_NDK_PACKAGE: ndk;28.2.13676358
  ANDROID_CMAKE_PACKAGE: cmake;3.22.1

jobs:
  build-and-static-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "$ANDROID_PLATFORM_PACKAGE" \
            "$ANDROID_BUILD_TOOLS_PACKAGE" \
            "$ANDROID_NDK_PACKAGE" \
            "$ANDROID_CMAKE_PACKAGE"
      - name: Apply deterministic Direct Player integration
        run: python3 tools/apply_direct_player_integration.py
      - name: Unit, instrumentation compile, lint, and APK build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-evidence
          ./gradlew --stacktrace --console=plain \
            testRootlessFdroidDebugUnitTest \
            assembleRootlessFdroidDebugAndroidTest \
            lintRootlessFdroidDebug \
            assembleRootlessFdroidDebug \
            2>&1 | tee ci-evidence/gradle-build.log
      - name: Upload Gradle failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: direct-player-gradle-failure-${{ github.sha }}
          path: ci-evidence/gradle-build.log
          if-no-files-found: warn
      - name: Dependency and license evidence
        run: |
          mkdir -p ci-evidence
          ./gradlew --console=plain :app:dependencies \
            --configuration rootlessFdroidDebugRuntimeClasspath \
            > ci-evidence/rootlessFdroidDebug-runtime-dependencies.txt
          grep -E "androidx.media3:media3-(common|exoplayer)" \
            ci-evidence/rootlessFdroidDebug-runtime-dependencies.txt
      - name: Hostile static review gates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-evidence
          git diff --name-only origin/develop/direct-player-usb-foundation...HEAD \
            | tee ci-evidence/changed-files.txt
          git diff --name-only | tee -a ci-evidence/changed-files.txt
          if grep -Ei '\.(aar|jar|so|dll|dylib|exe)$' ci-evidence/changed-files.txt; then
            echo "Unexpected binary dependency in Direct Player child diff" >&2
            exit 1
          fi
          if grep -RInE --exclude-dir=build --exclude='*.md' \
            '(FileOutputStream|openFileOutput|Files\.write).*(pcm|raw audio)|media title|DISPLAY_NAME.*diagnostic' \
            app/src/main tools 2>/dev/null; then
            echo "Potential raw PCM/media identity persistence found" >&2
            exit 1
          fi
          if grep -RInE --exclude-dir=build --exclude='*.md' \
            '(mqa.*(decode|render).*= *true|MQA decoded|MQA rendered)' \
            app/src/main 2>/dev/null; then
            echo "Unsupported MQA capability claim found" >&2
            exit 1
          fi
          grep -RIn "finalSystemMixMeasured" app/src/main \
            > ci-evidence/final-system-mix-claim-audit.txt || true
      - name: Verify package, label, signer, native libraries, and 16 KiB alignment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-evidence/apk
          APK="$(find app/build/outputs/apk/rootlessFdroid/debug -type f -name '*arm64-v8a-debug.apk' | head -n1)"
          test -n "$APK"
          cp "$APK" ci-evidence/apk/RootlessZachDSP-S23Ultra-direct-player-debug.apk
          AAPT="$ANDROID_HOME/build-tools/36.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/36.0.0/zipalign"
          "$AAPT" dump badging "$APK" | tee ci-evidence/apk/badging.txt
          grep -F "package: name='com.zfkirke0109.rootlesszachdsp.debug'" ci-evidence/apk/badging.txt
          grep -F "application-label:'RootlessZachDSP'" ci-evidence/apk/badging.txt
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee ci-evidence/apk/apksigner.txt
          "$ZIPALIGN" -c -P 16 -v 4 "$APK" | tee ci-evidence/apk/zipalign-16k.txt
          unzip -l "$APK" | grep -E 'lib/arm64-v8a/.*\.so' | tee ci-evidence/apk/arm64-native-libraries.txt
          sha256sum "$APK" | tee ci-evidence/apk/SHA256SUMS.txt
          "$AAPT" dump xmltree "$APK" AndroidManifest.xml > ci-evidence/apk/manifest-tree.txt
          grep -F 'DirectPlayerActivity' ci-evidence/apk/manifest-tree.txt
      - name: Commit validated integration
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git add app/build.gradle.kts \
            app/src/main/AndroidManifest.xml \
            app/src/main/res/xml/app_preferences.xml \
            app/src/main/java/me/timschneeberger/rootlessjamesdsp/fragment/settings/SettingsFragment.kt
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(player): integrate Direct Player into rootless app"
          git push origin HEAD:feature/direct-player-ui
      - name: Upload build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RootlessZachDSP-direct-player-${{ github.sha }}
          path: ci-evidence
          if-no-files-found: warn
          retention-days: 90

  emulator-navigation:
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "$ANDROID_PLATFORM_PACKAGE" \
            "$ANDROID_BUILD_TOOLS_PACKAGE" \
            "$ANDROID_NDK_PACKAGE" \
            "$ANDROID_CMAKE_PACKAGE"
      - name: Apply deterministic Direct Player integration
        run: python3 tools/apply_direct_player_integration.py
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Settings and Direct Player navigation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set +e
            mkdir -p "$GITHUB_WORKSPACE/ci-evidence/emulator"
            ./gradlew --stacktrace --console=plain connectedRootlessFdroidDebugAndroidTest \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-evidence/emulator/gradle.log"
            status=${PIPESTATUS[0]}
            printf '%s\n' "$status" > "$GITHUB_WORKSPACE/ci-evidence/emulator/exit-code.txt"
            find "$GITHUB_WORKSPACE/app/build/outputs/androidTest-results" -type f -maxdepth 8 \
              -exec cp --parents '{}' "$GITHUB_WORKSPACE/ci-evidence/emulator/" \; 2>/dev/null || true
            exit 0
      - name: Summarize emulator result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          status_file="$GITHUB_WORKSPACE/ci-evidence/emulator/exit-code.txt"
          test -f "$status_file"
          status="$(cat "$status_file")"
          grep -Ein 'FAILURES|FAILED|NoMatchingViewException|AssertionFailedError|Process crashed|Exception|Error:' \
            "$GITHUB_WORKSPACE/ci-evidence/emulator/gradle.log" \
            | tail -n 80 \
            | tee "$GITHUB_WORKSPACE/ci-evidence/emulator/failure-summary.txt" || true
          tail -n 160 "$GITHUB_WORKSPACE/ci-evidence/emulator/gradle.log" \
            > "$GITHUB_WORKSPACE/ci-evidence/emulator/gradle-tail.txt"
          test "$status" = "0"
      - name: Upload emulator evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-player-emulator-${{ github.sha }}
          path: ${{ github.workspace }}/ci-evidence/emulator
          if-no-files-found: error
          retention-days: 90
