name: Long-run Diagnostics Follow-up

on:
  push:
    branches: ["perf/long-run-diagnostics-followup"]
  pull_request:
    branches: ["perf/realtime-audio-diagnostics"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: long-run-diagnostics-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM_PACKAGE: platforms;android-36
  ANDROID_BUILD_TOOLS_PACKAGE: build-tools;36.0.0
  ANDROID_NDK_PACKAGE: ndk;28.2.13676358
  ANDROID_CMAKE_PACKAGE: cmake;3.22.1

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android toolchain
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "$ANDROID_PLATFORM_PACKAGE" \
            "$ANDROID_BUILD_TOOLS_PACKAGE" \
            "$ANDROID_NDK_PACKAGE" \
            "$ANDROID_CMAKE_PACKAGE"

      - name: Unit tests, instrumentation compile, lint, and APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --stacktrace --console=plain \
            testRootlessFdroidDebugUnitTest \
            assembleRootlessFdroidDebugAndroidTest \
            lintRootlessFdroidDebug \
            assembleRootlessFdroidDebug

      - name: Verify schema, package, signer, ARM64 library, and 16 KiB alignment
        shell: bash
        run: |
          set -euo pipefail
          APK="$(find app/build/outputs/apk/rootlessFdroid/debug -type f -name '*arm64-v8a-debug.apk' | head -n1)"
          test -n "$APK"
          AAPT="$ANDROID_HOME/build-tools/36.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/36.0.0/zipalign"
          "$AAPT" dump badging "$APK" | tee badging.txt
          grep -F "package: name='com.zfkirke0109.rootlesszachdsp.debug'" badging.txt
          grep -F "application-label:'RootlessZachDSP'" badging.txt
          "$APKSIGNER" verify --verbose --print-certs "$APK" | tee apksigner.txt
          "$ZIPALIGN" -c -P 16 -v 4 "$APK" | tee zipalign-16k.txt
          unzip -l "$APK" | grep -E 'lib/arm64-v8a/.*\.so' | tee arm64-native-libraries.txt
          grep -RIn 'SCHEMA_VERSION = 2' app/src/main/java/me/timschneeberger/rootlessjamesdsp/diagnostics/AudioDiagnosticJson.kt
          sha256sum "$APK" | tee SHA256SUMS.txt

      - name: Privacy and real-time-path guards
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE --exclude-dir=build --exclude='*.md' \
            '(FileOutputStream|openFileOutput|Files\.write).*(pcm|raw audio)' \
            app/src/main 2>/dev/null; then
            echo "Potential raw PCM persistence found" >&2
            exit 1
          fi
          grep -RIn 'processingWindowMicros' \
            app/src/main/java/me/timschneeberger/rootlessjamesdsp/audio/transport/AudioTransportTelemetry.kt
          if grep -n 'sortedMicros.sort()' \
            app/src/main/java/me/timschneeberger/rootlessjamesdsp/audio/transport/AudioTransportTelemetry.kt \
            | grep -q 'recordProcessing'; then
            echo "Percentile sorting appears on the urgent record path" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: RootlessZachDSP-long-run-diagnostics-${{ github.sha }}
          path: |
            app/build/outputs/apk/rootlessFdroid/debug/*arm64-v8a-debug.apk
            app/build/reports/tests/testRootlessFdroidDebugUnitTest/**
            app/build/reports/lint-results-*
            badging.txt
            apksigner.txt
            zipalign-16k.txt
            arm64-native-libraries.txt
            SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90
